<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(to right,#fbc2a3,#f8b6c1);
  text-align:center;
  padding:40px;
}

.box{
  background:white;
  width:350px;
  margin:auto;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{color:#ff6b81;}

.item{
  margin:15px 0;
  font-size:16px;
}

button{
  background:#ff6b81;
  color:white;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#ff4f6d;
}
</style>
</head>

<body>

<div class="box">

<h2>🛒 My Cart</h2>

<div class="item">Burger - ₹120</div>
<div class="item">Pizza - ₹250</div>

<hr>

<h3>Total: ₹370</h3>

<a href="summary.html">
<button>Proceed to Buy</button>
</a>

</div>

</body>
</html>
