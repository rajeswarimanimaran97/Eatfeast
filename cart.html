<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>
<style>
body{font-family:Arial;background:linear-gradient(to right,#fbc2a3,#f8b6c1);text-align:center;padding:20px;margin:0;}
.box{background:white;width:90%;max-width:400px;margin:auto;padding:25px;border-radius:15px;box-shadow:0 10px 20px rgba(0,0,0,0.2);}
h2{color:#ff6b81;}
.item{margin:15px 0;font-size:16px;display:flex;justify-content:space-between;}
button{background:#ff6b81;color:white;padding:12px;width:100%;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
button:hover{background:#ff4f6d;}
hr{margin:15px 0;}
</style>
</head>
<body>

<div class="box">
<h2>🛒 My Cart</h2>
<div id="cart-items"></div>
<hr>
<h3 id="total"></h3>
<button onclick="checkout()">Proceed to Buy</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("cart-items");
const totalEl = document.getElementById("total");

function renderCart(){
  container.innerHTML="";
  let total = 0;
  cart.forEach(i=>{
    container.innerHTML+=`<div class="item">${i.name} x ${i.qty} - ₹${i.price*i.qty}</div>`;
    total += i.price*i.qty;
  });
  totalEl.innerText="Total: ₹"+total;
}
renderCart();

function checkout(){
  if(cart.length===0){ alert("Cart is empty!"); return; }
  window.location="summary.html";
}
</script>

</body>
</html>
