<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EatFeast Categories</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#fbc2a3,#f8b6c1);text-align:center;padding:20px;}
.header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.header img{width:50px;height:50px;border-radius:50%;object-fit:cover;}
.header h1{color:white;font-size:28px;}
.welcome{color:white;margin-bottom:20px;font-size:18px;font-weight:bold;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:20px;padding:20px;max-width:900px;margin:auto;}
.card{background:white;padding:12px;border-radius:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(0,0,0,0.3);}
.card img{width:100%;height:120px;object-fit:cover;border-radius:10px;}
.card h3{margin-top:10px;color:#ff4f6d;}
a{text-decoration:none;color:inherit;}
@media(max-width:480px){
    .header h1{font-size:22px;}
    .card img{height:100px;}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.jpg" alt="EatFeast Logo">
    <h1>EatFeast</h1>
</div>

<div class="welcome" id="welcome">Welcome, User!</div>

<div class="container">

<a href="menu.html?cat=desserts">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="Desserts">
    <h3>Desserts</h3>
  </div>
</a>

<a href="menu.html?cat=snacks">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="Snacks">
    <h3>Snacks</h3>
  </div>
</a>

<a href="menu.html?cat=lunch">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="Lunch">
    <h3>Lunch</h3>
  </div>
</a>

<a href="menu.html?cat=breakfast">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1493770348161-369560ae357d" alt="Breakfast">
    <h3>Breakfast</h3>
  </div>
</a>

</div>

<script>
// Show logged-in username from localStorage
const userData = JSON.parse(localStorage.getItem("user"));
if(userData && userData.name){
    document.getElementById("welcome").innerText = `Welcome, ${userData.name}!`;
}
</script>

</body>
</html>
