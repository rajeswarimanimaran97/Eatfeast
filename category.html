<!DOCTYPE html>
<html>
<head>
<title>Category</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#fbc2a3,#f8b6c1);}
.header{display:flex;justify-content:center;align-items:center;padding:15px;background:white;}
.logo{width:50px;height:50px;border-radius:50%;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
<img src="logo.jpg" class="logo">
<h2>EatFeast</h2>
</div>

<h2 id="welcome" style="text-align:center;"></h2>

<div class="container">
<div class="card" onclick="selectCat('Snacks')">Snacks</div>
<div class="card" onclick="selectCat('Lunch')">Lunch</div>
<div class="card" onclick="selectCat('Desserts')">Desserts</div>
</div>

<script>
let user=JSON.parse(localStorage.getItem("user"));
document.getElementById("welcome").innerText="Welcome "+user.name;

function selectCat(cat){
localStorage.setItem("category",cat);
window.location="menu.html";
}
</script>

</body>
</html>
