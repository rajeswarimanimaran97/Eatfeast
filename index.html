<!DOCTYPE html>
<html>
<head>
<title>EatFeast Login</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#fbc2a3,#f8b6c1);}
.header{display:flex;justify-content:center;align-items:center;padding:15px;background:white;}
.logo{width:50px;height:50px;border-radius:50%;}
h2{color:#ff4f6d;margin-left:10px;}
.box{background:white;padding:25px;border-radius:15px;width:300px;margin:50px auto;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:10px;background:#ff6b81;color:white;border:none;border-radius:8px;}
#msg{margin-top:10px;font-size:14px;}
</style>
</head>

<body>

<div class="header">
<img src="logo.jpg" class="logo">
<h2>EatFeast</h2>
</div>

<div class="box">
<h3>Login</h3>

<form id="form">
<input type="text" id="name" placeholder="Username" required>
<input type="tel" id="phone" placeholder="Phone" required>
<button>Login</button>
</form>

<p id="msg"></p>
<p><a href="#" onclick="forgot()">Forgot Password?</a></p>
</div>

<script>
const form=document.getElementById("form");
const msg=document.getElementById("msg");

form.addEventListener("submit",e=>{
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name.length<3){msg.style.color="red";msg.innerText="Invalid name";return;}
if(phone.length!=10){msg.style.color="red";msg.innerText="Invalid phone";return;}

localStorage.setItem("user",JSON.stringify({name,phone}));

msg.style.color="green";
msg.innerText="Login successful...";

setTimeout(()=>{window.location="category.html";},1000);
});

function forgot(){
msg.innerText="Reset link sent 📩";
}
</script>

</body>
</html>
