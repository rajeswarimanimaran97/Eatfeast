<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EatFeast Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#ffe6ea;text-align:center;padding:20px;}
.header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;}
.header img{width:50px;height:50px;border-radius:50%;object-fit:cover;}
.header h1{color:#ff4f6d;font-size:28px;}
.welcome{color:#ff4f6d;margin-bottom:20px;font-size:18px;font-weight:bold;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;padding:20px;max-width:1000px;margin:auto;}
.food{background:white;padding:15px;border-radius:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);transition:0.3s;}
.food:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(0,0,0,0.3);}
.food img{width:100%;height:130px;object-fit:cover;border-radius:10px;}
.food h3{margin-top:10px;color:#ff4f6d;}
.food p{margin:8px 0;font-weight:bold;}
button{width:100%;background:#ff6b81;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;transition:0.3s;}
button:hover{background:#ff4f6d;}
@media(max-width:480px){
  .header h1{font-size:22px;}
  .food img{height:110px;}
}
</style>
</head>
<body>

<div class="header">
  <img src="logo.jpg" alt="EatFeast Logo">
  <h1>EatFeast Menu</h1>
</div>

<div class="welcome" id="welcome">Welcome!</div>

<div class="container">
  <!-- Menu items will appear dynamically -->
</div>

<script>
// Display username from localStorage
const userData = JSON.parse(localStorage.getItem("user"));
if(userData && userData.name){
    document.getElementById("welcome").innerText = `Welcome, ${userData.name}!`;
}

// Get category from URL (?cat=snacks, desserts, lunch, breakfast)
const urlParams = new URLSearchParams(window.location.search);
const category = urlParams.get("cat");

// Verified working image links for all categories
const menuItems = {
  desserts: [
    {name:"Chocolate Cake", price:150, img:"https://images.unsplash.com/photo-1578985545062-69928b7db3b1?auto=format&fit=crop&w=400&q=80"},
    {name:"Ice Cream", price:80, img:"https://images.unsplash.com/photo-1599785209707-3c3b22e58d56?auto=format&fit=crop&w=400&q=80"},
    {name:"Cupcake", price:100, img:"https://images.unsplash.com/photo-1604152135912-04a0c63f5f7a?auto=format&fit=crop&w=400&q=80"}
  ],
  snacks: [
    {name:"Pizza", price:250, img:"https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=400&q=80"},
    {name:"Burger", price:120, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400&q=80"},
    {name:"Fries", price:80, img:"https://images.unsplash.com/photo-1576107232684-1279f390859f?auto=format&fit=crop&w=400&q=80"}
  ],
  lunch: [
    {name:"Rice Plate", price:200, img:"https://images.unsplash.com/photo-1600891964870-0ea6b80bbf79?auto=format&fit=crop&w=400&q=80"},
    {name:"Curry", price:180, img:"https://images.unsplash.com/photo-1617191513056-0617abdf81f9?auto=format&fit=crop&w=400&q=80"},
    {name:"Noodles", price:150, img:"https://images.unsplash.com/photo-1552332386-f8dd00dc2f46?auto=format&fit=crop&w=400&q=80"}
  ],
  breakfast: [
    {name:"Idli", price:50, img:"https://images.unsplash.com/photo-1584271590577-a1bfe83ce1c6?auto=format&fit=crop&w=400&q=80"},
    {name:"Dosa", price:60, img:"https://images.unsplash.com/photo-1603079659383-275c1882ebae?auto=format&fit=crop&w=400&q=80"},
    {name:"Juice", price:60, img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&q=80"}
  ]
};

// Generate menu items dynamically
const container = document.querySelector(".container");
(menuItems[category] || []).forEach(item => {
  const div = document.createElement("div");
  div.classList.add("food");
  div.innerHTML = `
    <img src="${item.img}" alt="${item.name}">
    <h3>${item.name}</h3>
    <p>₹${item.price}</p>
    <button onclick="addToCart('${item.name}', ${item.price})">Add</button>
  `;
  container.appendChild(div);
});

// Add items to cart
function addToCart(name, price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(`${name} added to cart!`);
}
</script>

</body>
</html>
