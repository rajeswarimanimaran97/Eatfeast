<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#ffe6ea;
  text-align:center;
}

/* Heading */
h1{
  color:#ff4f6d;
  padding:20px;
}

/* Container */
.container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:20px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

/* Food Card */
.food{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

/* Hover effect */
.food:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 25px rgba(0,0,0,0.3);
}

/* Image */
.food img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}

/* Title */
.food h3{
  margin-top:10px;
  color:#ff4f6d;
}

/* Price */
.food p{
  margin:8px 0;
  font-weight:bold;
}

/* Button */
button{
  width:100%;
  background:#ff6b81;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff4f6d;
}

/* Remove link style */
a{
  text-decoration:none;
}

/* 📱 Mobile */
@media(max-width:480px){
  h1{
    font-size:20px;
  }

  .food img{
    height:110px;
  }
}

</style>
</head>

<body>

<h1>🍔 EatFeast Menu</h1>

<div class="container">

<div class="food">
  <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
  <h3>Burger</h3>
  <p>₹120</p>
  <a href="cart.html"><button>Add</button></a>
</div>

<div class="food">
  <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
  <h3>Pizza</h3>
  <p>₹250</p>
  <a href="cart.html"><button>Add</button></a>
</div>

<div class="food">
  <img src="https://images.unsplash.com/photo-1576107232684-1279f390859f">
  <h3>Fries</h3>
  <p>₹80</p>
  <a href="cart.html"><button>Add</button></a>
</div>

<div class="food">
  <img src="https://images.unsplash.com/photo-1621263764928-df1444c5e859">
  <h3>Juice</h3>
  <p>₹60</p>
  <a href="cart.html"><button>Add</button></a>
</div>

</div>

</body>
</html>
